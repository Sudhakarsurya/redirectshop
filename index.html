<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in — Shopify</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
  </style>
</head>
<body class="h-full flex items-center justify-center p-4">
  <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden">
    <!-- Header -->
    <div class="p-8 flex flex-col items-center border-b">
      <img src="https://cdn.shopify.com/s/files/1/0533/2089/files/shopify-logo.svg" 
           alt="Shopify" class="h-10 mb-6">
      <h1 class="text-2xl font-semibold text-gray-900">Log in</h1>
    </div>

    <div class="p-8 space-y-6">
      <!-- Email -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" id="email" 
               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
               placeholder="you@example.com">
      </div>

      <!-- Password -->
      <div>
        <div class="flex justify-between items-center mb-1">
          <label class="block text-sm font-medium text-gray-700">Password</label>
          <a href="#" class="text-sm text-green-600 hover:underline">Forgot password?</a>
        </div>
        <input type="password" id="password"
               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
               placeholder="••••••••">
      </div>

      <!-- Login Button -->
      <button onclick="handleLogin()"
              class="w-full bg-[#008060] hover:bg-[#00664d] text-white font-medium py-3.5 rounded-lg transition">
        Log in
      </button>

      <!-- Divider -->
      <div class="flex items-center gap-4">
        <div class="flex-1 h-px bg-gray-200"></div>
        <span class="text-sm text-gray-500">or</span>
        <div class="flex-1 h-px bg-gray-200"></div>
      </div>

      <!-- Social Logins -->
      <div class="grid grid-cols-1 gap-3">
        <button onclick="socialLogin('Google')" 
                class="flex items-center justify-center gap-3 border border-gray-300 hover:bg-gray-50 py-3 rounded-lg font-medium">
          <i class="fa-brands fa-google text-red-500"></i>
          Continue with Google
        </button>
        <button onclick="socialLogin('Apple')" 
                class="flex items-center justify-center gap-3 border border-gray-300 hover:bg-gray-50 py-3 rounded-lg font-medium">
          <i class="fa-brands fa-apple text-black"></i>
          Continue with Apple
        </button>
      </div>

      <!-- Sign up link -->
      <div class="text-center text-sm text-gray-600">
        New to Shopify? 
        <a href="#" class="text-green-600 hover:underline font-medium">Get started</a>
      </div>
    </div>

    <!-- Footer -->
    <div class="px-8 py-6 bg-gray-50 border-t text-xs text-gray-500 space-y-2">
      <div class="flex justify-center gap-6">
        <a href="#" class="hover:text-gray-700">Terms</a>
        <a href="#" class="hover:text-gray-700">Privacy</a>
        <a href="#" class="hover:text-gray-700">Help</a>
      </div>
      <p class="text-center">By continuing, you agree to Shopify’s Terms of Service and Privacy Policy.</p>
    </div>
  </div>

  <script>
    function handleLogin() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (!email || !password) {
        alert("Please enter your email and password.");
        return;
      }

      // Simulate login
      alert(`✅ Logged in as ${email}\n\n(This is a demo clone - no real authentication)`);
    }

    function socialLogin(provider) {
      alert(`🔄 Redirecting to ${provider} login...\n\n(This is a static demo)`);
    }

    // Tailwind script already loaded
  </script>
</body>
</html>
