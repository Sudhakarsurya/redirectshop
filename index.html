<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in — Shopify</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
  </style>
</head>
<body class="bg-[#0f0f0f] min-h-screen flex items-center justify-center p-6">
  
  <div class="w-full max-w-[380px] bg-white rounded-3xl shadow-2xl overflow-hidden">
    
    <!-- Shopify Logo -->
    <div class="flex justify-center pt-10 pb-6">
      <img src="https://cdn.shopify.com/s/files/1/0533/2089/files/shopify-bag.svg" 
           alt="Shopify" class="h-16 w-16">
    </div>

    <div class="px-8 pb-8">
      <h1 class="text-3xl font-semibold text-center mb-1">Log in</h1>
      <p class="text-center text-gray-600 mb-8">Continue to Shopify</p>

      <!-- Email Input -->
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
        <input type="email" id="email" 
               class="w-full px-4 py-3.5 border border-gray-300 rounded-2xl focus:outline-none focus:border-black focus:ring-1 focus:ring-black text-base"
               placeholder=" ">
      </div>

      <!-- Continue with Email Button -->
      <button onclick="continueWithEmail()" 
              class="w-full bg-black hover:bg-gray-900 text-white font-semibold py-3.5 rounded-2xl text-base transition">
        Continue with email
      </button>

      <!-- Divider -->
      <div class="flex items-center my-8">
        <div class="flex-1 h-px bg-gray-200"></div>
        <span class="px-6 text-sm text-gray-500">or</span>
        <div class="flex-1 h-px bg-gray-200"></div>
      </div>

      <!-- Passkey -->
      <button onclick="passkeyLogin()" 
              class="w-full flex items-center justify-center gap-3 border border-gray-300 hover:bg-gray-50 py-3.5 rounded-2xl font-medium mb-3">
        <i class="fa-solid fa-key text-xl"></i>
        Sign in with passkey
      </button>

      <!-- Social Logins -->
      <div class="grid grid-cols-4 gap-3">
        <button onclick="socialLogin('Google')" class="aspect-square border border-gray-300 hover:bg-gray-50 rounded-2xl flex items-center justify-center text-2xl">
          <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google" class="h-6">
        </button>
        <button onclick="socialLogin('Apple')" class="aspect-square border border-gray-300 hover:bg-gray-50 rounded-2xl flex items-center justify-center text-3xl">
          
        </button>
        <button onclick="socialLogin('Facebook')" class="aspect-square border border-gray-300 hover:bg-gray-50 rounded-2xl flex items-center justify-center text-2xl text-[#1877F2]">
          <i class="fa-brands fa-facebook-f"></i>
        </button>
        <button onclick="socialLogin('WhatsApp')" class="aspect-square border border-gray-300 hover:bg-gray-50 rounded-2xl flex items-center justify-center text-3xl text-[#25D366]">
          <i class="fa-brands fa-whatsapp"></i>
        </button>
      </div>

      <!-- Sign up -->
      <div class="text-center mt-8 text-sm">
        New to Shopify? 
        <a href="#" class="text-black font-medium hover:underline">Get started →</a>
      </div>
    </div>

    <!-- Footer -->
    <div class="bg-gray-50 px-8 py-6 text-center border-t text-xs text-gray-500">
      <a href="#" class="block mb-4 hover:text-gray-700">Need Help?</a>
      <p>
        By continuing, you agree to the <span class="underline">Terms</span> and 
        <span class="underline">Privacy Policy</span>, and to receive marketing emails from Shopify. 
        <span class="underline">Unsubscribe anytime.</span>
      </p>
    </div>
  </div>

  <script>
    function continueWithEmail() {
      const email = document.getElementById('email').value.trim();
      if (email) {
        alert(`✅ Continuing with ${email}\n\n(This is a visual demo only)`);
      } else {
        alert("Please enter your email");
      }
    }

    function passkeyLogin() {
      alert("🔑 Passkey login triggered (Demo)");
    }

    function socialLogin(provider) {
      alert(`🔄 Redirecting to ${provider} login...\n\n(Demo only)`);
    }

    // Auto focus
    window.onload = () => document.getElementById('email').focus();
  </script>
</body>
</html>
